<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Namuori Portfolio CMS 원리 다이어그램</title>
  <desc id="desc">content 폴더의 데이터가 관리자 편집기, GitHub draft 브랜치와 Pull Request, Cloudflare Pages 빌드를 거쳐 공개 포트폴리오로 배포되는 흐름을 설명한다.</desc>
  <defs>
    <style>
      .bg { fill: #f8faf6; }
      .title { font: 700 34px Pretendard, "Noto Sans KR", Arial, sans-serif; fill: #183128; }
      .subtitle { font: 500 17px Pretendard, "Noto Sans KR", Arial, sans-serif; fill: #587064; }
      .stage-title { font: 700 21px Pretendard, "Noto Sans KR", Arial, sans-serif; fill: #173127; }
      .stage-sub { font: 500 14px Pretendard, "Noto Sans KR", Arial, sans-serif; fill: #51685f; }
      .small { font: 500 13px Pretendard, "Noto Sans KR", Arial, sans-serif; fill: #40554d; }
      .mono { font: 600 13px "JetBrains Mono", Consolas, monospace; fill: #23533f; }
      .chip { font: 600 12px Pretendard, "Noto Sans KR", Arial, sans-serif; fill: #24493a; }
      .num { font: 700 14px "JetBrains Mono", Consolas, monospace; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #cfd8d1; stroke-width: 1.4; }
      .soft-green { fill: #e6f2ea; stroke: #a9c6b3; }
      .soft-blue { fill: #e7f0f8; stroke: #a9bfd4; }
      .soft-amber { fill: #f6edd9; stroke: #d5bf8d; }
      .soft-lav { fill: #eee9f6; stroke: #c3b7da; }
      .accent { fill: #16724f; }
      .arrow { stroke: #4a6358; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7b8c83; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow-muted); }
      .security { fill: #f9fbf8; stroke: #b7c8be; stroke-width: 1.3; stroke-dasharray: 6 6; }
      .icon { stroke: #1f5f46; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #d8eadf; stroke: #1f5f46; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a6358" />
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8c83" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#254035" flood-opacity="0.10" />
    </filter>
  </defs>

  <rect class="bg" width="1440" height="810" />

  <text class="title" x="64" y="72">Namuori Portfolio CMS는 어떻게 글을 배포할까?</text>
  <text class="subtitle" x="64" y="105">콘텐츠 데이터가 관리자 편집기, GitHub PR, Cloudflare Pages를 지나 공개 포트폴리오가 되는 과정</text>

  <g transform="translate(56 148)" filter="url(#shadow)">
    <rect class="card soft-green" x="0" y="0" width="190" height="290" rx="18" />
    <circle class="accent" cx="32" cy="34" r="16" />
    <text class="num" x="27" y="39">1</text>
    <text class="stage-title" x="58" y="41">콘텐츠</text>
    <text class="stage-sub" x="24" y="76">글과 프로필의 원본</text>
    <g transform="translate(24 104)">
      <rect class="icon-fill" x="8" y="0" width="82" height="96" rx="7" />
      <path class="icon" d="M24 23h50M24 43h50M24 63h36" />
      <path class="icon" d="M30 -10h78v96" opacity="0.45" />
      <path class="icon" d="M42 -22h78v96" opacity="0.28" />
    </g>
    <text class="mono" x="24" y="226">content/</text>
    <text class="small" x="24" y="250">JSON + MDX</text>
    <text class="small" x="24" y="273">profile, projects, skills</text>
  </g>

  <path class="arrow" d="M254 292 H322" />

  <g transform="translate(328 148)" filter="url(#shadow)">
    <rect class="card soft-blue" x="0" y="0" width="190" height="290" rx="18" />
    <circle class="accent" cx="32" cy="34" r="16" />
    <text class="num" x="27" y="39">2</text>
    <text class="stage-title" x="58" y="41">관리자</text>
    <text class="stage-sub" x="24" y="76">브라우저에서 수정</text>
    <g transform="translate(24 104)">
      <rect class="icon-fill" x="0" y="6" width="110" height="78" rx="8" />
      <path class="icon" d="M18 28h74M18 48h45M18 66h64" />
      <path class="icon" d="M27 104h56M55 84v20" />
      <circle class="accent" cx="94" cy="26" r="7" />
    </g>
    <text class="mono" x="24" y="226">/admin</text>
    <text class="small" x="24" y="250">로그인 후 편집</text>
    <text class="small" x="24" y="273">Save draft</text>
  </g>

  <path class="arrow" d="M526 292 H594" />

  <g transform="translate(600 148)" filter="url(#shadow)">
    <rect class="card soft-amber" x="0" y="0" width="190" height="290" rx="18" />
    <circle class="accent" cx="32" cy="34" r="16" />
    <text class="num" x="27" y="39">3</text>
    <text class="stage-title" x="58" y="41">GitHub</text>
    <text class="stage-sub" x="24" y="76">변경 이력과 PR</text>
    <g transform="translate(24 103)">
      <circle class="icon-fill" cx="23" cy="24" r="12" />
      <circle class="icon-fill" cx="86" cy="24" r="12" />
      <circle class="icon-fill" cx="86" cy="84" r="12" />
      <path class="icon" d="M35 24h39M86 36v36M23 36c0 28 15 48 51 48" />
    </g>
    <text class="mono" x="24" y="226">draft/...</text>
    <text class="small" x="24" y="250">Pull Request</text>
    <text class="small" x="24" y="273">main으로 병합</text>
  </g>

  <path class="arrow" d="M798 292 H866" />

  <g transform="translate(872 148)" filter="url(#shadow)">
    <rect class="card soft-lav" x="0" y="0" width="190" height="290" rx="18" />
    <circle class="accent" cx="32" cy="34" r="16" />
    <text class="num" x="27" y="39">4</text>
    <text class="stage-title" x="58" y="41">검증/빌드</text>
    <text class="stage-sub" x="24" y="76">깨진 데이터 차단</text>
    <g transform="translate(24 106)">
      <rect class="icon-fill" x="2" y="2" width="110" height="78" rx="8" />
      <path class="icon" d="M22 30l15 15 34-36" />
      <path class="icon" d="M20 64h76" opacity="0.55" />
    </g>
    <text class="mono" x="24" y="226">pnpm check</text>
    <text class="mono" x="24" y="249">pnpm test</text>
    <text class="mono" x="24" y="272">pnpm build</text>
  </g>

  <path class="arrow" d="M1070 292 H1138" />

  <g transform="translate(1144 148)" filter="url(#shadow)">
    <rect class="card soft-blue" x="0" y="0" width="190" height="290" rx="18" />
    <circle class="accent" cx="32" cy="34" r="16" />
    <text class="num" x="27" y="39">5</text>
    <text class="stage-title" x="58" y="41">Cloudflare</text>
    <text class="stage-sub" x="24" y="76">미리보기와 배포</text>
    <g transform="translate(22 108)">
      <path class="icon-fill" d="M36 72h78c20 0 30-14 24-30-5-13-17-18-31-16C99 7 78 0 58 10 45 16 38 27 37 42 22 39 10 50 10 64c0 5 4 8 26 8z" />
      <path class="icon" d="M44 47h70M58 30h38" opacity="0.55" />
    </g>
    <text class="small" x="24" y="226">Preview URL</text>
    <text class="small" x="24" y="250">Production deploy</text>
    <text class="mono" x="24" y="273">dist/public</text>
  </g>

  <path class="arrow" d="M1239 448 C1239 520 1070 544 924 544 H828" />

  <g transform="translate(590 504)" filter="url(#shadow)">
    <rect class="card soft-green" x="0" y="0" width="238" height="170" rx="18" />
    <circle class="accent" cx="34" cy="34" r="16" />
    <text class="num" x="29" y="39">6</text>
    <text class="stage-title" x="62" y="41">공개 포트폴리오</text>
    <text class="stage-sub" x="28" y="76">방문자가 보는 결과</text>
    <g transform="translate(30 96)">
      <rect class="icon-fill" x="0" y="0" width="88" height="50" rx="7" />
      <path class="icon" d="M14 17h60M14 32h37" />
      <path class="icon" d="M111 0h50M111 25h50M111 50h50" />
    </g>
    <text class="mono" x="28" y="154">namuori.net</text>
  </g>

  <path class="dash" d="M1226 450 C1128 612 943 704 800 646" />
  <text class="small" x="943" y="640">미리보기 확인 후 다시 수정 가능</text>

  <g transform="translate(78 500)">
    <rect class="security" x="0" y="0" width="430" height="174" rx="18" />
    <text class="stage-title" x="26" y="38">쓰기 작업을 막는 안전장치</text>
    <text class="small" x="26" y="72">관리 화면은 공개 도메인에 있어도, 저장 API는 여러 조건을 통과해야 한다.</text>
    <g transform="translate(26 94)">
      <rect class="card" x="0" y="0" width="116" height="40" rx="10" />
      <text class="chip" x="18" y="25">GitHub 로그인</text>
      <rect class="card" x="132" y="0" width="116" height="40" rx="10" />
      <text class="chip" x="151" y="25">허용 계정</text>
      <rect class="card" x="264" y="0" width="116" height="40" rx="10" />
      <text class="chip" x="282" y="25">세션 검증</text>
      <rect class="card" x="0" y="54" width="116" height="40" rx="10" />
      <text class="chip" x="18" y="79">same-origin</text>
      <rect class="card" x="132" y="54" width="116" height="40" rx="10" />
      <text class="chip" x="151" y="79">경로 제한</text>
      <rect class="card" x="264" y="54" width="116" height="40" rx="10" />
      <text class="chip" x="282" y="79">크기 제한</text>
    </g>
  </g>

  <g transform="translate(904 522)">
    <rect class="security" x="0" y="0" width="414" height="126" rx="18" />
    <text class="stage-title" x="24" y="38">처음 배우는 사람을 위한 비유</text>
    <text class="small" x="24" y="70">content/는 원고함, /admin은 편집기, GitHub PR은 검토 요청서,</text>
    <text class="small" x="24" y="96">Cloudflare Pages는 인쇄소, namuori.net은 완성된 책장이다.</text>
  </g>
</svg>
